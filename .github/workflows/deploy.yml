name: Deploy Flutter Web ke GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: TBCDetection-main
        run: flutter pub get

      - name: Build web
        working-directory: TBCDetection-main
        run: |
          flutter build web --release \
            --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy ke gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: TBCDetection-main/build/web
